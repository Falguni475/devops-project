<!DOCTYPE html>
<html>

<head>
<title>Symbiosis Admission Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo-section">
<h1>Symbiosis Institute of Technology, Nagpur</h1>
</div>

<nav>
<ul>
<li>Home</li>
<li>About</li>
<li>Admissions</li>
<li>Departments</li>
<li>Contact</li>
</ul>
</nav>

</header>

<!-- BANNER + FORM -->
<div class="banner">

<div class="form-container">

<h2>Admission Registration Form</h2>

<form id="form" onsubmit="return validateForm()">

<label>Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Password</label>
<input type="password" id="password">

<label>Confirm Password</label>
<input type="password" id="confirm">

<label>Gender</label>
<div class="gender">
<input type="checkbox" name="gender">Male
<input type="checkbox" name="gender">Female
<input type="checkbox" name="gender">Other
</div>

<label>Course</label>
<select id="course">
<option value="">Select Course</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Tech</option>
<option>MBA</option>
</select>

<input type="submit" value="Register">

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
